name: tripweather
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  tripweather:
    type: application
    platform: iOS
    sources: [tripweather]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripweather
        INFOPLIST_FILE: tripweather/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: tripweather/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Trip Weather Log
  tripweatherTests:
    type: bundle.unit-test
    platform: iOS
    sources: [tripweatherTests]
    dependencies:
      - target: tripweather    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  tripweatherUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [tripweatherUITests]
    dependencies:
      - target: tripweather    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  tripweather:
    build:
      targets:
        tripweather: all
    test:
      targets:
        - tripweatherTests
        - tripweatherUITests
